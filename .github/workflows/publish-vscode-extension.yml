name: Publish VS Code Extension

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or commit SHA)
        required: false
        default: main
      publish:
        description: Publish to VS Code Marketplace
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: publish-vscode-extension-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and package extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Validate release tag matches package version
        if: github.event_name == 'release'
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="${GITHUB_REF_NAME#v}"

          echo "Package version: ${PACKAGE_VERSION}"
          echo "Release tag: ${RELEASE_TAG}"

          if [[ "${PACKAGE_VERSION}" != "${RELEASE_TAG}" ]]; then
            echo "Release tag does not match package.json version." >&2
            exit 1
          fi

      - name: Package VSIX
        run: |
          set -euo pipefail
          npx @vscode/vsce package --out "umlmark-${GITHUB_SHA}.vsix"

      - name: List packaged artifact
        run: ls -lh *.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-vsix
          path: '*.vsix'
          if-no-files-found: error

  publish:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension-vsix
          path: dist

      - name: List downloaded artifact
        run: ls -lh dist

      - name: Publish extension from VSIX
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail

          if [[ -z "${VSCE_PAT:-}" ]]; then
            echo "Missing required repository secret: VSCE_PAT" >&2
            exit 1
          fi

          VSIX_FILE=$(find dist -maxdepth 1 -name '*.vsix' -print -quit)
          if [[ -z "${VSIX_FILE}" ]]; then
            echo "No VSIX artifact found in dist/." >&2
            exit 1
          fi

          echo "Publishing ${VSIX_FILE}"
          npx @vscode/vsce publish --packagePath "${VSIX_FILE}" --pat "${VSCE_PAT}"
